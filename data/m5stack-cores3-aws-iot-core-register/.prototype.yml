title: |
  M5Stack Core S3 を AWS Iot Core へ登録する
description: ''
published: '2026-06-21'

units:
  - description: |
      M5Stack Core S3 を買いました。
      これを AWS Iot Core へ登録してみます。
    image: size=(min) ./m5stackcores3.jpg

  - cap: AWS IoT Core にてデバイス登録
  - description: |
      まずはAWSコンソールを開きましょう。
      AWS IoT Core の管理画面へ飛びます。
    image: size=(min) ./aws-console.png

  - description: |
      つづいて画面中央の「デバイスを接続」というボタンを押しましょう。
      こちらよりデバイス登録できます。
    image: size=(min) ./aws-iot-core-console-register-start.png
  - description: 「次へ」をクリックします。
    image: size=(min) ./aws-iot-core-console-register-step1.png
  - description: |
      「新しいモノを作成」を選んで名前を入力しましょう。
      残りはデフォルトの設定で大丈夫です。「次へ」を押しましょう。
    image: size=(min) ./aws-iot-core-console-register-step2.png
  
  - description: |
      次はSDKの設定になります。
      今回は SDK は使用しないためこちらもデフォルト設定で大丈夫です。「次へ」を押しましょう。
    image: size=(min) ./aws-iot-core-console-register-step3.png

  - description: |
      こちらのページにて接続キットをダウンロードしてください。
      接続キットには証明書等が含まれており後ほど使います。
    image: size=(min) ./aws-iot-core-console-register-step4.png 
  - description: |
      こちらのページはスキップしましょう。
    image: size=(min) ./aws-iot-core-console-register-step5.png 
  - description: |
      これにてモノの登録は完了です。
      「モノを表示」をクリックして詳細ページへ行きましょう。
    image: size=(min) ./aws-iot-core-console-register-step6.png 
  
  - cap: コードを書く
    description: |
      つづいて MQTT のクライアントを実装しましょう。

      サンプルコードを載せます。実装内容は下記です
      ・WiFi へ接続
      ・AWS IoT Core のエンドポイントへ接続し MQTT 通信を試みる

      接続キットの情報を元に src/vars.hpp を適宜変更してください。      
      そして PlatformIO にて M5Stack へアップロードしましょう。

  - title: サンプルコード
    code:
      open: src/main.cpp
      include:
        - src
        - src/main.cpp
        - src/vars.hpp
        - .gitignore
        - platformio.ini
      units:
        - title: エンドポイント
          description: |
            接続キットの start.sh に記載があります。もしくはAWSコンソールの「ドメイン設定」というページにも記載があります
          mark: src/vars.hpp:22
          links:
            - title: https://docs.aws.amazon.com/ja_jp/iot/latest/developerguide/iot-custom-endpoints-configurable.html
              url: https://docs.aws.amazon.com/ja_jp/iot/latest/developerguide/iot-custom-endpoints-configurable.html
        - title: クライアントID
          description: |
            IoT Core Policy にて当該クライアントからの接続が許可されている必要があります。デフォルトでは sdk-nodejs-* が許可されているためこのようにしてますが後々見直されるのをお勧めします
          mark: src/vars.hpp:25
          links:
            - title: https://docs.aws.amazon.com/iot/latest/developerguide/connect-policy.html
              url: https://docs.aws.amazon.com/iot/latest/developerguide/connect-policy.html
        - title: トピック名
          description: |
            MQTTのトピック名も IoT Core Policy にて制御されます。こちらもデフォルトで許可されているものを記載しておりますが、後々見直されるのをお勧めします
          mark: src/main.cpp:36

  - cap: 動作確認
    description: |
      M5Stack へアップロードできたら動作確認しましょう。
      まず IoT Core の管理画面にてトピックをサブスクライブします。

      トピックのフィルターに sdk/test/js を入力して、サブスクライブボタンを押します。
    image: size=(min) ./aws-iot-core-mqtt-publish-subscribe.png

  - description: |
      次に M5Stack を起動しましょう。
    image: size=(min) ./m5stackcores3-aws-iot.jpg
  - description: |
      すると IoT Core の管理画面にて、メッセージが流れてくるはずです。
    image: size=(min) ./aws-iot-core-mqtt-publish-result.png

  - cap: おわり
    description: |
      以上にて AWS IoT Core へ接続し MQTT 通信できました。
