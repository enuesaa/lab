title: |
  M5Stack Core S3 を AWS Iot Core へ登録する
description: ''
published: '2026-06-09'

units:
  - description: |
      M5Stack Core S3 を買いました。
      これを AWS Iot Core へ登録してみます。
    image: size=(min) ./m5stackcores3.jpg

  - title: symbol=(1.) AWS コンソールを開く
    description: |
      AWSコンソールを開いて、IoT Core の管理画面へ飛びましょう。
    image: ./aws-console.png

  - title: symbol=(2.) デバイスを登録
    description: |
      画面中央の「デバイスを接続」というボタンを押しましょう。
      こちらよりデバイス登録できます。
    image: ./aws-iot-core-console-register-start.png
  - description: 「次へ」をクリックします。
    image: ./aws-iot-core-console-register-step1.png
  - description: |
      「新しいモノを作成」を選んで名前を入力しましょう。
      残りはデフォルトの設定で大丈夫です。「次へ」を押しましょう。
    image: ./aws-iot-core-console-register-step2.png
  
  - description: |
      次はSDKの設定になります。
      今回は SDK は使用しないためこちらもデフォルト設定で大丈夫です。「次へ」を押しましょう。
    image: ./aws-iot-core-console-register-step3.png

  - description: |
      こちらのページにて接続キットをダウンロードしてください。
      接続キットには証明書等が含まれており後ほど使います。
    image: ./aws-iot-core-console-register-step4.png 
  - description: |
      こちらのページはスキップしましょう。
    image: ./aws-iot-core-console-register-step5.png 
  - description: |
      これにてモノの登録は完了です。
      「モノを表示」をクリックして詳細ページへ行きましょう。
    image: ./aws-iot-core-console-register-step6.png 

  - title: symbol=(3.) コードを書く
  - title: 証明書を設置
  - title: M5Stack へ書き込み
  - title: 動作確認
  - title: MQTT でメッセージを送信
