title: |
  M5Stack Core S3 を AWS Iot Core へ登録する
description: ''
published: '2026-06-09'

units:
  - title: モノ
    description: |
      M5Stack Core S3 です。
      これを AWS Iot Core へ登録します。

  - title: symbol=(1.) AWS コンソールを開く
    description: |
      AWSコンソールを開いて、IoT Core の管理画面へ飛びましょう。
    image: ./aws-console.png

  - title: symbol=(2.) デバイスを登録
    description: |
      左サイドメニューの「1 個のデバイスを接続」というリンクをクリックすると、デバイスの登録ページへ遷移できます。こちらで M5Stack をデバイス登録しましょう。
    image: ./aws-iot-core-console-register-start.png

  - description: |
      「新しいモノを作成」を選んで各項目を入力します。

  - title: 証明書をダウンロード
  - title: コードを書く
  - title: 証明書を設置
  - title: M5Stack へ書き込み
  - title: 動作確認
  - title: MQTT でメッセージを送信
