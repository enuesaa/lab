title: |
  M5Stack Core S3 を AWS Iot Core へ登録する
description: ''
published: '2026-06-09'

units:
  - title: モノ
    description: |
      M5Stack Core S3 です。
      これを AWS Iot Core へ登録します。

  - title: symbol=(1.) AWS コンソールを開く
    description: |
      AWSコンソールを開いて、IoT Core の管理画面へ飛びましょう。
    image: ./aws-console.png

  - title: symbol=(2.) デバイスを登録
    description: |
      画面中央の「デバイスを接続」というボタンを押しましょう。
      こちらよりデバイス登録できます。
    image: ./aws-iot-core-console-register-start.png
  - description: 「次へ」をクリックします。
    image: ./aws-iot-core-console-register-step1.png
  - description: |
      「新しいモノを作成」を選んで名前を入力しましょう。
    image: ./aws-iot-core-console-register-step2.png

  - title: 証明書をダウンロード
  - title: コードを書く
  - title: 証明書を設置
  - title: M5Stack へ書き込み
  - title: 動作確認
  - title: MQTT でメッセージを送信
